<!doctype html>
<html lang="ar" dir="rtl" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جمر التنور | المنيو الإلكتروني</title>
  <script>
    // Apply saved theme before React loads to prevent flash
    try {
      const saved = localStorage.getItem('jamr_al_tannour_theme');
      if (saved === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    } catch (e) { }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
