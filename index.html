<!doctype html>
<html lang="ar" dir="rtl" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جمر التنور | المنيو الإلكتروني</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ff6b00" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="جمر التنور" />
  <meta name="mobile-web-app-capable" content="yes" />
  <script>
    // Apply saved theme before React loads to prevent flash
    try {
      const saved = localStorage.getItem('jamr_al_tannour_theme');
      if (saved === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    } catch (e) { }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW ref fail: ', err));
      });
    }
  </script>
</body>

</html>
